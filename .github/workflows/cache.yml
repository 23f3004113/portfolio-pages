name: Cache Test

on:
  workflow_dispatch:

jobs:
  test-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: cache-b08a264

      - name: prime-cache-b08a264
        run: echo "Cache hit = ${{ steps.cache-step.outputs.cache-hit }}"
